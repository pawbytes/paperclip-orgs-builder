orced in stage files. Redundancy between stages is complementary, not duplicative.", "dimensions": {"stage_flow": {"score": "strong", "notes": "Clean DAG, no circular deps, every stage narrows the design space. Vision → Identity → Structure → Config → Skills → Goals → Budget → Scheduling → Assembly."}, "purpose_alignment": {"score": "moderate", "notes": "Principles honored in implementation but assembly output gap means stages 5-8 work doesn't fully materialize. Permissions ghost field in Stage 4."}, "complexity_appropriateness": {"score": "strong", "notes": "9 stages defensible for the domain. Fewer would require more context-switching; more would add ceremony. No viable merge candidates."}}, "findings": [{"title": "Stage 4→5 feedback loop risk", "file": "references/05-skills-discovery.md", "line": 1, "detail": "Discovering a skill in Stage 5 might reveal a capability the agent should have had defined in Stage 4. No explicit instruction to reconcile capabilities after skill discovery.", "source": "skill-cohesion"}, {"title": "No inter-agent communication design stage", "file": "SKILL.md", "line": 31, "detail": "Stage 3 designs reporting lines but there's no structured design for how agents communicate — message formats, escalation protocols, handoff conventions.", "source": "skill-cohesion"}]}, "efficiency": {"assessment": "Rated 92/100. Sequential inter-stage ordering is correct for HITL. Minor intra-stage parallelization opportunities exist: Stage 5 skill searches across agents (~5-15s), Stage 9 review reads, and activation config loads. No subagent delegation needed. Draft JSON pattern is efficient — compact JSON, incremental reads, compaction-safe. Scripts are appropriately fast for expected workload (5-7 agents).", "findings": [{"title": "Stage 5 skill searches can be parallelized across agents", "file": "references/05-skills-discovery.md", "line": 1, "detail": "Skill discovery queries are fully independent. Parallel npx skills find calls for all agents would save ~5-15 seconds of serial CLI execution.", "source": "execution-efficiency"}, {"title": "Stage 9 review reads can be batched", "file": "references/09-assembly-review.md", "line": 1, "detail": "After validation, directory tree listing, COMPANY.md content, and sample AGENTS.md content are independent reads that can be performed in parallel.", "source": "execution-efficiency"}, {"title": "Domain reference lazy-loading should be explicit", "file": "SKILL.md", "line": 51, "detail": "Domain reference (~800 tokens) is only needed at stages 3 and 9, but current wording is ambiguous. An eager agent might load it every stage, wasting ~1,200 tokens per unnecessary load.", "source": "execution-efficiency"}]}, "experience": {"assessment": "Strong for first-timers through stages 1-3 via propose-and-refine. Friction emerges at Stage 4 (technical complexity without context) and Stage 7 (no cost anchoring). Expert users frustrated by mandatory linear walk. Edge cases (solo agent, mega org) have no detection or adaptation. Hostile environments (no uv/npx) fail silently at stages 5 and 9.", "journeys": [{"archetype": "first-timer", "summary": "Excellent experience through stages 1-3 via propose-and-refine pattern. Friction at Stage 4 (technical config like temperature/model without contextualized explanations) and Stage 7 (no cost anchoring — 'Is $50/month a lot?'). Drop-off risk at Stage 4 marathon.", "friction_points": ["Stage 4 technical config lacks contextualized explanations for first-timers", "Stage 7 budget has no pricing benchmarks or analogies", "Stage 4 per-agent review causes rubber-stamping by agent 5+"], "bright_spots": ["Stages 1-3 propose-and-refine pattern shines", "User feels guided, not interrogated"]}, {"archetype": "expert", "summary": "Frustrating experience. Users who arrive with complete org specs must walk through 9 stages even though they've already done the thinking. No fast-track or pre-populate mechanism.", "friction_points": ["No quick-start detection for structured input", "Must explain things they already know", "Drop-off risk at Stage 1 — feels like unnecessary ceremony"], "bright_spots": ["Quality of proposals when they do engage is high", "Compaction recovery means they can resume if interrupted"]}, {"archetype": "confused", "summary": "Stage 1 handles well — proposes a vision from whatever they share. But subsequent stages assume increasing clarity. By Stage 5, they don't know what skills agents need because they don't understand what agents do.", "friction_points": ["Increasing complexity without matching scaffolding", "Stage 5 skills discovery assumes user knows agent capabilities"], "bright_spots": ["Suggestive HITL approach carries confused users further than interrogative would", "Full proposals with defaults reduce decision burden"]}, {"archetype": "edge-case", "summary": "Solo-agent orgs get an awkward hierarchy stage. Mega-orgs (20+ agents) break Stage 4 into a 2-hour marathon. No-CEO requests hit a validation wall with no explanation.", "friction_points": ["Solo agent: org chart stage feels pointless", "Mega org: Stage 4 becomes 2-hour marathon with no batch processing", "No-CEO request: fails validation without explaining why CEO is required"], "bright_spots": ["general role catch-all handles unusual role types"]}, {"archetype": "hostile-environment", "summary": "No upfront environment verification. Users discover missing tools (uv, npx) at Stage 5 or Stage 9 — deep into the workflow. Fallback paths exist but feel like afterthoughts.", "friction_points": ["No uv check until Stage 9 assembly attempt", "No npx check until Stage 5 skills discovery", "Manual assembly fallback is a large ask of the LLM", "No network access makes skills discovery a dead end"], "bright_spots": ["Script fallback instructions exist in SKILL.md", "Skills stage has manual URL fallback path"]}, {"archetype": "automator", "summary": "No API, no headless mode, no batch capability. Must interact manually for every org. Hybrid review-only mode and full headless mode assessed as achievable.", "friction_points": ["No headless/batch mode for scripted org creation", "No template system for reusing approved designs", "Must walk through all 9 interactive stages every time"], "bright_spots": ["Draft JSON as state file is already machine-parseable", "Scripts are standalone and could be called directly with pre-built JSON"]}], "autonomous": {"potential": "partially-adaptable", "notes": "Fundamentally interactive by design (HITL at every gate). A hybrid review-only mode (pre-populate all stages, single combined review) is low-effort and high-value. Full headless mode is viable for power users with complete specs — needs input schema, validation, and default-filling. Draft JSON state file and standalone scripts provide a foundation."}, "findings": [{"title": "No environment detection on activation", "file": "SKILL.md", "line": 14, "detail": "Four external dependencies (uv, npx, skills CLI, Paperclip CLI) are assumed available with no upfront check. Failures surface deep in the workflow.", "source": "enhancement-opportunities"}, {"title": "skills.sh external dependency risk", "file": "references/05-skills-discovery.md", "line": 1, "detail": "Stage 5 hardcodes reliance on a third-party skill registry. If skills.sh changes its API or goes down, the stage partially fails. Fallback path reads as an afterthought.", "source": "skill-cohesion"}, {"title": "Budget stage lacks cost anchoring", "file": "references/07-budget-optimization.md", "line": 1, "detail": "Stage 7 asks agent to suggest a budget but provides no model pricing data, no historical benchmarks, no example budget profiles. The agent is guessing.", "source": "enhancement-opportunities"}]}, "scripts": {"assessment": "Two existing scripts are well-implemented with zero lint findings and companion tests. Two new scripts recommended: validate-draft.py (consolidates draft validation across all stages) and summarize-draft.py (compact summaries for recovery and context reduction). The highest-value opportunity is mid-workflow draft validation — catches errors 1–8 stages earlier than current flow.", "token_savings": "~4,200–12,100 tokens per full run (deterministic validation) + ~500–2,000 tokens per compaction event (summary generation)", "findings": [{"title": "validate-draft.py — unified mid-workflow validator", "file": "scripts/validate-package.py", "line": 1, "detail": "Consolidates 6 sub-findings: JSON schema, org tree integrity, issue prefix format, cron syntax, budget arithmetic, cross-reference validation. Progressive checks by stage threshold.", "source": "script-opportunities"}, {"title": "summarize-draft.py — compact stage-aware summaries", "file": "SKILL.md", "line": 47, "detail": "Produces ~150-token compact summary instead of LLM parsing raw JSON (~500-2,000+ tokens). Two modes: stage-entry context extraction and compaction recovery summary.", "source": "script-opportunities"}, {"title": "assemble-package.py lacks idempotency", "file": "scripts/assemble-package.py", "line": 1, "detail": "Running twice overwrites without warning. No --force flag or backup mechanism. Also no partial assembly — one bad agent fails the whole run.", "source": "enhancement-opportunities"}, {"title": "slugify() drops unicode characters", "file": "scripts/assemble-package.py", "line": 1, "detail": "'ÜberTech' becomes 'bertech'. Should use a unicode-aware slugifier to handle international company/agent names.", "source": "enhancement-opportunities"}]}}, "recommendations": [{"rank": 1, "action": "Create validate-draft.py mid-workflow validator with progressive stage-threshold checks (org tree at ≥3, budget arithmetic at ≥7, cron syntax at ≥8). Call after each stage gate approval.", "resolves": 7, "effort": "medium"}, {"rank": 2, "action": "Fix assembly output gap — either populate package directories with project/skill/routine files from draft data, or remove empty directories and clarify the runtime-seeding model in stage instructions.", "resolves": 6, "effort": "medium"}, {"rank": 3, "action": "Improve compaction recovery — add stageProgress to draft JSON, write recovery preamble templates, add save-and-quit messaging at every gate, reinforce design principles with one-line reminders in stage Progression sections.", "resolves": 6, "effort": "medium"}, {"rank": 4, "action": "Add batch-approval mode to Stage 4 — group agents by role tier (CEO solo, managers grouped, same-role workers batched), show progress indicators, offer template application after first of a role type.", "resolves": 5, "effort": "medium"}, {"rank": 5, "action": "Trim ~210 tokens of cross-stage prompt duplication — collapse Stage 5 search strategy, deduplicate model-tier advice between stages 4 and 7, replace Stage 9 validation list with script deferral, add config header to frontmatter.", "resolves": 5, "effort": "low"}, {"rank": 6, "action": "Add environment detection on activation — silently check for uv and npx, adapt flow to skip skills search or plan for manual assembly if tools are missing.", "resolves": 3, "effort": "low"}, {"rank": 7, "action": "Add quick-start mode for expert users — detect structured input on activation, offer to pre-populate draft and skip to a combined review pass instead of walking through all 9 stages.", "resolves": 2, "effort": "medium"}]}</script>
<script>
const RAW = JSON.parse(document.getElementById('report-data').textContent);
const DATA = normalize(RAW);

function normalize(d) {
  // Fix meta field variants
  if (d.meta) {
    d.meta.skill_name = d.meta.skill_name || d.meta.skill || d.meta.name || 'Unknown';
    d.meta.scanner_count = typeof d.meta.scanner_count === 'number' ? d.meta.scanner_count
      : Array.isArray(d.meta.scanners_run) ? d.meta.scanners_run.length
      : d.meta.scanner_count || 0;
  }
  // Fix strengths: plain strings → objects
  d.strengths = (d.strengths || []).map(s =>
    typeof s === 'string' ? { title: s, detail: '' } : { title: s.title || '', detail: s.detail || '' }
  );
  // Fix opportunities: title→name, findings_resolved→findings
  (d.opportunities || []).forEach(o => {
    o.name = o.name || o.title || '';
    o.finding_count = o.finding_count || (o.findings || o.findings_resolved || []).length;
    if (!o.findings && o.findings_resolved) o.findings = [];
    o.action = o.action || o.fix || '';
  });
  // Fix broken: description→detail, fix→action
  (d.broken || []).forEach(b => {
    b.detail = b.detail || b.description || '';
    b.action = b.action || b.fix || '';
  });
  // Fix recommendations: description→action
  (d.recommendations || []).forEach((r, i) => {
    r.action = r.action || r.description || '';
    r.rank = r.rank || i + 1;
  });
  // Fix journeys: persona→archetype, friction→friction_points
  if (d.detailed_analysis && d.detailed_analysis.experience) {
    d.detailed_analysis.experience.journeys = (d.detailed_analysis.experience.journeys || []).map(j => ({
      archetype: j.archetype || j.persona || j.name || 'Unknown',
      summary: j.summary || j.journey_summary || j.description || j.friction || '',
      friction_points: j.friction_points || (j.friction ? [j.friction] : []),
      bright_spots: j.bright_spots || (j.bright ? [j.bright] : [])
    }));
  }
  return d;
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

function init() {
  const m = DATA.meta;
  document.getElementById('skill-name').textContent = m.skill_name;
  document.getElementById('subtitle').innerHTML =
    `${esc(m.skill_path)} &bull; ${m.timestamp ? m.timestamp.split('T')[0] : ''} &bull; ${m.scanner_count || 0} scanners &bull; <a href="quality-report.md">Full Report &nearr;</a>`;

  document.getElementById('grade-area').innerHTML =
    `<div class="grade grade-${DATA.grade}">${esc(DATA.grade)}</div>`;
  document.getElementById('narrative').textContent = DATA.narrative || '';

  renderBroken();
  renderOpportunities();
  renderStrengths();
  renderRecommendations();
  renderDetailed();
}

function renderBroken() {
  const items = DATA.broken || [];
  if (!items.length) return;
  let html = `<div class="section"><div class="section-header open" onclick="toggleSection(this)">`;
  html += `<span class="arrow">&#9654;</span><span class="label">Broken / Critical (${items.length})</span>`;
  html += `<div class="actions"><button class="btn btn-primary" onclick="event.stopPropagation();showBrokenPrompt()">Fix These</button></div>`;
  html += `</div><div class="section-body open">`;
  items.forEach(item => {
    const loc = item.file ? `${item.file}${item.line ? ':'+item.line : ''}` : '';
    html += `<div class="item">`;
    html += `<span class="badge badge-${item.severity || 'high'}">${esc(item.severity || 'high')}</span> `;
    if (loc) html += `<span class="item-file">${esc(loc)}</span>`;
    html += `<div class="item-title">${esc(item.title)}</div>`;
    if (item.detail) html += `<div class="item-desc">${esc(item.detail)}</div>`;
    if (item.action) html += `<div class="item-action"><strong>Fix:</strong> ${esc(item.action)}</div>`;
    html += `</div>`;
  });
  html += `</div></div>`;
  document.getElementById('broken-section').innerHTML = html;
}

function renderOpportunities() {
  const opps = DATA.opportunities || [];
  if (!opps.length) return;
  let html = `<div class="section"><div class="section-header open" onclick="toggleSection(this)">`;
  html += `<span class="arrow">&#9654;</span><span class="label">Opportunities (${opps.length})</span>`;
  html += `</div><div class="section-body open">`;
  opps.forEach((opp, idx) => {
    html += `<div class="opp">`;
    html += `<div class="opp-header">`;
    html += `<span class="badge badge-${opp.severity || 'medium'}">${esc(opp.severity || 'medium')}</span>`;
    html += `<span class="opp-name">${idx+1}. ${esc(opp.name)}</span>`;
    html += `<span class="opp-count">${opp.finding_count || (opp.findings||[]).length} observations</span>`;
    html += `<button class="btn" onclick="toggleFindings(${idx})">Details</button>`;
    html += `<button class="btn btn-primary" onclick="showThemePrompt(${idx})">Fix This</button>`;
    html += `</div>`;
    html += `<div class="opp-desc">${esc(opp.description)}</div>`;
    if (opp.impact) html += `<div class="opp-impact">Impact: ${esc(opp.impact)}</div>`;
    html += `<div class="opp-findings" id="findings-${idx}">`;
    (opp.findings || []).forEach(f => {
      const loc = f.file ? `${f.file}${f.line ? ':'+f.line : ''}` : '';
      html += `<div class="opp-finding">`;
      html += `<strong>${esc(f.title)}</strong>`;
      if (loc) html += ` <span class="item-file">${esc(loc)}</span>`;
      if (f.source) html += ` <span class="source">[${esc(f.source)}]</span>`;
      if (f.detail) html += `<br>${esc(f.detail)}`;
      html += `</div>`;
    });
    html += `</div></div>`;
  });
  html += `</div></div>`;
  document.getElementById('opportunities-section').innerHTML = html;
}

function renderStrengths() {
  const items = DATA.strengths || [];
  if (!items.length) return;
  let html = `<div class="section"><div class="section-header" onclick="toggleSection(this)">`;
  html += `<span class="arrow">&#9654;</span><span class="label">Strengths (${items.length})</span>`;
  html += `</div><div class="section-body">`;
  items.forEach(s => {
    html += `<div class="strength-item"><div class="title">${esc(s.title)}</div>`;
    if (s.detail) html += `<div class="detail">${esc(s.detail)}</div>`;
    html += `</div>`;
  });
  html += `</div></div>`;
  document.getElementById('strengths-section').innerHTML = html;
}

function renderRecommendations() {
  const recs = DATA.recommendations || [];
  if (!recs.length) return;
  let html = `<div class="section"><div class="section-header open" onclick="toggleSection(this)">`;
  html += `<span class="arrow">&#9654;</span><span class="label">Recommendations</span>`;
  html += `</div><div class="section-body open"><div class="recs">`;
  recs.forEach(r => {
    html += `<div class="rec">`;
    html += `<span class="rec-rank">#${r.rank}</span>`;
    html += `${esc(r.action)}`;
    if (r.resolves) html += ` <span class="rec-resolves">(resolves ${r.resolves} observations)</span>`;
    html += `</div>`;
  });
  html += `</div></div></div>`;
  document.getElementById('recommendations-section').innerHTML = html;
}

function renderDetailed() {
  const da = DATA.detailed_analysis;
  if (!da) return;
  const dims = [
    ['structure', 'Structure & Integrity'],
    ['craft', 'Craft & Writing Quality'],
    ['cohesion', 'Cohesion & Design'],
    ['efficiency', 'Execution Efficiency'],
    ['experience', 'User Experience'],
    ['scripts', 'Script Opportunities']
  ];
  let html = `<div class="section"><div class="section-header" onclick="toggleSection(this)">`;
  html += `<span class="arrow">&#9654;</span><span class="label">Detailed Analysis</span>`;
  html += `</div><div class="section-body">`;
  dims.forEach(([key, label]) => {
    const dim = da[key];
    if (!dim) return;
    html += `<div class="analysis-section"><h4>${label}</h4>`;
    if (dim.assessment) html += `<p>${esc(dim.assessment)}</p>`;
    if (dim.dimensions) {
      html += `<table style="width:100%;font-size:0.85rem;margin:0.5rem 0;border-collapse:collapse;">`;
      html += `<tr><th style="text-align:left;padding:0.3rem;border-bottom:1px solid var(--border)">Dimension</th><th style="text-align:left;padding:0.3rem;border-bottom:1px solid var(--border)">Score</th><th style="text-align:left;padding:0.3rem;border-bottom:1px solid var(--border)">Notes</th></tr>`;
      Object.entries(dim.dimensions).forEach(([d, v]) => {
        if (v && typeof v === 'object') {
          html += `<tr><td style="padding:0.3rem;border-bottom:1px solid var(--border)">${esc(d.replace(/_/g,' '))}</td><td style="padding:0.3rem;border-bottom:1px solid var(--border)">${esc(v.score||'')}</td><td style="padding:0.3rem;border-bottom:1px solid var(--border)">${esc(v.notes||'')}</td></tr>`;
        }
      });
      html += `</table>`;
    }
    if (dim.journeys && dim.journeys.length) {
      dim.journeys.forEach(j => {
        html += `<div style="margin:0.5rem 0"><strong>${esc(j.archetype)}</strong>: ${esc(j.summary || j.journey_summary || '')}`;
        if (j.friction_points && j.friction_points.length) {
          html += `<ul style="color:var(--high);font-size:0.85rem;padding-left:1.25rem">`;
          j.friction_points.forEach(fp => { html += `<li>${esc(fp)}</li>`; });
          html += `</ul>`;
        }
        html += `</div>`;
      });
    }
    if (dim.autonomous) {
      const a = dim.autonomous;
      html += `<p><strong>Headless Potential:</strong> ${esc(a.potential||'')}`;
      if (a.notes) html += ` — ${esc(a.notes)}`;
      html += `</p>`;
    }
    (dim.findings || []).forEach(f => {
      const loc = f.file ? `${f.file}${f.line ? ':'+f.line : ''}` : '';
      html += `<div class="analysis-finding">`;
      if (f.severity) html += `<span class="badge badge-${f.severity}">${esc(f.severity)}</span> `;
      html += `${esc(f.title)}`;
      if (loc) html += ` <span class="item-file">${esc(loc)}</span>`;
      html += `</div>`;
    });
    html += `</div>`;
  });
  html += `</div></div>`;
  document.getElementById('detailed-section').innerHTML = html;
}

// --- Interactions ---
function toggleSection(el) {
  el.classList.toggle('open');
  el.nextElementSibling.classList.toggle('open');
}

function toggleFindings(idx) {
  document.getElementById('findings-'+idx).classList.toggle('open');
}

// --- Prompt Generation ---
function showThemePrompt(idx) {
  const opp = DATA.opportunities[idx];
  if (!opp) return;
  let prompt = `## Task: ${opp.name}\nSkill path: ${DATA.meta.skill_path}\n\n`;
  prompt += `### Problem\n${opp.description}\n\n`;
  prompt += `### Fix\n${opp.action}\n\n`;
  if (opp.findings && opp.findings.length) {
    prompt += `### Specific observations to address:\n\n`;
    opp.findings.forEach((f, i) => {
      const loc = f.file ? (f.line ? `${f.file}:${f.line}` : f.file) : '';
      prompt += `${i+1}. **${f.title}**`;
      if (loc) prompt += ` (${loc})`;
      if (f.detail) prompt += `\n   ${f.detail}`;
      prompt += `\n`;
    });
  }
  document.getElementById('modal-title').textContent = `Fix: ${opp.name}`;
  document.getElementById('modal-content').textContent = prompt.trim();
  document.getElementById('modal').classList.add('visible');
}

function showBrokenPrompt() {
  const items = DATA.broken || [];
  let prompt = `## Task: Fix Critical Issues\nSkill path: ${DATA.meta.skill_path}\n\n`;
  items.forEach((item, i) => {
    const loc = item.file ? (item.line ? `${item.file}:${item.line}` : item.file) : '';
    prompt += `${i+1}. **[${(item.severity||'high').toUpperCase()}] ${item.title}**\n`;
    if (loc) prompt += `   File: ${loc}\n`;
    if (item.detail) prompt += `   Context: ${item.detail}\n`;
    if (item.action) prompt += `   Fix: ${item.action}\n`;
    prompt += `\n`;
  });
  document.getElementById('modal-title').textContent = 'Fix Critical Issues';
  document.getElementById('modal-content').textContent = prompt.trim();
  document.getElementById('modal').classList.add('visible');
}

function closeModal() { document.getElementById('modal').classList.remove('visible'); }

function copyModal() {
  const text = document.getElementById('modal-content').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.modal .btn-primary');
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = 'Copy to Clipboard'; }, 1500);
  });
}

init();
</script>
</body>
</html>
